version: '3.8'

services:
  db:
    container_name: postgres
    image: postgres:15
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - dbstorage:/var/lib/postgresql/data

  web:
    container_name: web
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5001:5000"
    depends_on:
      - db
    env_file:
      - .env

volumes:
  dbstorage:
